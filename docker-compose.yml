#version: "3"
services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: laravel-app
        container_name: tito-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - titoapp

    nginx:
        image: nginx:alpine
        # platform: linux/arm64/v8 # Specify platform for ARM64
        container_name: tito-nginx
        restart: unless-stopped
        ports:
            - "8004:80"
        volumes:
            - ./:/var/www
            - ./nginx/laravel.conf:/etc/nginx/conf.d/default.conf
        networks:
            - titoapp

    db:
        image: mysql:8.0 # Use MySQL 8.0 which has ARM64 support
        # platform: linux/arm64/v8 # Specify platform for ARM64
        container_name: tito-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            # Remove MYSQL_USER and MYSQL_PASSWORD for root user
        ports:
            - "3311:3306"
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - titoapp

networks:
    titoapp:
        driver: bridge

volumes:
    dbdata:
        driver: local
